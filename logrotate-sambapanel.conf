# Ротация журнала действий панели (кто/что/когда через веб-интерфейс).
# Пишется процессом www-panel через обычный open()/write() на каждую
# запись (не держит файл открытым между вызовами) — поэтому classic-ротация
# (переименование + создание нового файла) работает без postrotate/HUP:
# следующая запись просто откроет по тому же пути уже новый пустой файл.

/var/log/sambapanel/audit.log {
    weekly
    rotate 8
    compress
    delaycompress
    missingok
    notifempty
    create 0640 www-panel www-panel
}
