# Ротация лога vfs_full_audit. В отличие от audit.log панели, этот файл
# держит открытым rsyslog (постоянно пишущий процесс) — простое переименование
# файла НЕ заставит rsyslog начать писать в новый, он продолжит писать в
# старый (уже переименованный, невидимый по прежнему пути) файл, пока не
# получит сигнал. Поэтому здесь обязателен postrotate с официальным
# скриптом rsyslog-rotate (идёт в комплекте с пакетом rsyslog на Ubuntu/Debian),
# который аккуратно сообщает демону переоткрыть файлы логов.
#
# При включённом "полном аудите" (см. README) это ОЧЕНЬ шумный лог —
# ежедневная ротация тут не роскошь, а необходимость.

/var/log/samba-full-audit/full-audit.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 syslog adm
    postrotate
        /usr/lib/rsyslog/rsyslog-rotate
    endscript
}
